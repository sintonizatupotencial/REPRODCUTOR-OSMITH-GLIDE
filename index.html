<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Osmith Subliminal Experience - Glide Embed</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        /* VARIABLES Y BASE EXACTA DEL DISEÑO ORIGINAL */
        :root { --cian: #00a8b5; --gold: #c5a059; --oscuro: rgba(2, 6, 8, 0.98); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; font-family: 'Inter', sans-serif; color: white; display: flex; align-items: center; justify-content: center; }
        
        /* REPRODUCTOR ESTÉTICA ORIGINAL (AJUSTADO PARA GLIDE) */
        #reproductor { 
            display: flex; z-index: 200; flex-direction: column; align-items: center; 
            background-color: var(--oscuro); backdrop-filter: blur(50px); padding: 30px 30px 40px 30px;
            border-radius: 12px; border: 6px solid transparent;
            background-image: linear-gradient(var(--oscuro), var(--oscuro)), linear-gradient(270deg, var(--cian), var(--gold), var(--cian), var(--gold));
            background-origin: padding-box, border-box; background-clip: padding-box, border-box;
            background-size: 100% 100%, 300% 300%;
            animation: flujoBorde 35s ease infinite;
            width: 100%; max-width: none; height: 100%; max-height: none;
            opacity: 1; position: relative; justify-content: center; box-sizing: border-box; overflow: hidden;
        }
        @keyframes flujoBorde { 0% { background-position: 0% 0%, 0% 50%; } 50% { background-position: 0% 0%, 100% 50%; } 100% { background-position: 0% 0%, 0% 50%; } }

        .smoke-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.5; }
        .smoke-layer { position: absolute; width: 200%; height: 200%; top: -50%; left: -50%; background-image: radial-gradient(circle at 20% 30%, var(--cian) 0%, transparent 40%), radial-gradient(circle at 80% 70%, var(--gold) 0%, transparent 40%); filter: blur(60px); animation: smokeMove 400s linear infinite; }
        @keyframes smokeMove { 0% { transform: rotate(0deg); } 50% { transform: rotate(180deg) translate(-5%, 5%); } 100% { transform: rotate(360deg); } }

        #texture-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; opacity: 0.35; mix-blend-mode: screen; }

        .header-brand-logo { 
            height: 320px; max-height: 85%; width: 480px; max-width: 100%; object-fit: contain;
            z-index: 2; margin: -15px auto 0 auto; padding: 0; display: block; flex-shrink: 1;
            filter: brightness(0) invert(1) drop-shadow(0 0 15px rgba(0, 168, 181, 0.9)); 
        }
        
        .track-display { text-align: center; z-index: 2; width: 100%; display: flex; flex-direction: column; justify-content: center; margin: 0 0 35px 0; padding-bottom: 0; flex-shrink: 0; }
        .track-name { font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 900; letter-spacing: 2px; color: white; margin: 0; text-transform: uppercase; }
        .track-client { font-family: 'Montserrat', sans-serif; font-size: 14px; color: var(--cian); letter-spacing: 4px; text-transform: uppercase; margin-top: 15px; font-weight: 800; }

        .bottom-controls-group { width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 5; margin-top: 0; margin-bottom: 0; flex-shrink: 0; }
        .controls-row { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 20px; box-sizing: border-box; }
        
        .btn-sec { background: rgba(0, 0, 0, 0.4); border: 1.5px solid rgba(197, 160, 89, 0.5); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; padding: 0; position: relative; flex-shrink: 0; }
        .btn-main { width: 68px; height: 68px; border: 3.5px solid var(--cian); background: rgba(0, 168, 181, 0.1); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(0, 168, 181, 0.4); transition: 0.3s; padding: 0; margin: 0; position: relative; flex-shrink: 0; }
        
        .btn-sec svg { width: 18px; fill: var(--gold); pointer-events: none; transition: 0.3s; }
        .btn-main svg { width: 30px; fill: var(--cian); pointer-events: none; transition: 0.3s; }

        .btn-sec:hover { background: rgba(197, 160, 89, 0.15); border-color: var(--gold); box-shadow: 0 0 15px rgba(197, 160, 89, 0.6), inset 0 0 8px rgba(197, 160, 89, 0.3); transform: scale(1.05); }
        .btn-sec:hover svg { filter: drop-shadow(0 0 5px var(--gold)); }
        .btn-main:hover { background: rgba(0, 168, 181, 0.25); box-shadow: 0 0 40px rgba(0, 168, 181, 0.9), inset 0 0 15px rgba(0, 168, 181, 0.5); transform: scale(1.05); }
        .btn-main:hover svg { filter: drop-shadow(0 0 8px var(--cian)); }

        .progress-container { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 5px; cursor: pointer; margin-bottom: 20px; position: relative; z-index: 5; transition: 0.3s; }
        .progress-container:hover { background: rgba(255, 255, 255, 0.2); box-shadow: 0 0 15px rgba(0, 168, 181, 0.5); }
        .progress-bar { height: 100%; width: 0%; background: var(--cian); border-radius: 5px; position: relative; }
        .progress-handle { position: absolute; right: -5px; top: 50%; transform: translateY(-50%); width: 10px; height: 10px; background: rgba(0, 168, 181, 0.2); border: 1.5px solid var(--cian); border-radius: 50%; box-shadow: 0 0 12px rgba(0, 168, 181, 0.9), inset 0 0 4px rgba(0, 168, 181, 0.6); opacity: 0; transition: transform 0.2s ease, opacity 0.2s ease; pointer-events: none; }
        .progress-container:hover .progress-handle { opacity: 1; transform: translateY(-50%) scale(1.1); }

        .gallery-container { position: relative; width: 100%; z-index: 10; }
        #gallery-modal { position: absolute; bottom: 100%; left: 0; width: 100%; background: #010808; border-radius: 20px; border: 1.5px solid var(--cian); opacity: 0; transform: translateY(15px); transition: 0.4s; overflow-y: auto; max-height: 250px; pointer-events: none; }
        #gallery-modal.active-modal { opacity: 1; transform: translateY(-10px); max-height: 250px; padding: 10px 0; pointer-events: auto; }
        
        .btn-gallery { background: rgba(0, 168, 181, 0.05); border: 2px solid var(--cian); color: #ffffff; padding: 16px 0; width: 100%; border-radius: 30px; font-size: 14px; cursor: pointer; letter-spacing: 4px; font-weight: 900; text-transform: uppercase; font-family: 'Montserrat', sans-serif; transition: 0.3s; }
        .btn-gallery:hover { background: rgba(0, 168, 181, 0.15); box-shadow: 0 0 20px rgba(0, 168, 181, 0.6), inset 0 0 10px rgba(0, 168, 181, 0.3); text-shadow: 0 0 8px rgba(255, 255, 255, 0.8); transform: scale(1.02); }

        .track-item { padding: 14px 20px; border-bottom: 1px solid rgba(0,168,181,0.1); cursor: pointer; font-size: 12px; font-family: 'Inter', sans-serif; font-weight: 600;}
        .track-item:hover { background: rgba(0, 168, 181, 0.1); color: var(--cian); }
    </style>
</head>
<body>

<div id="reproductor">
    <div class="smoke-overlay"><div class="smoke-layer"></div></div>
    <canvas id="texture-canvas"></canvas>
    
    <img src="https://i.imgur.com/your-cover.png" alt="Osmith Logo" class="header-brand-logo">

    <div class="track-display">
        <h1 class="track-name" id="display-name">Cargando...</h1>
        <div class="track-client" id="display-client">[NOMBRE_CLIENTE_GLIDE]</div>
    </div>
    
    <div class="bottom-controls-group">
        <div class="controls-row">
            <button class="btn-sec" id="btn-shuffle"><svg viewBox="0 0 24 24"><path d="M10.59,9.17L5.41,4L4,5.41l5.17,5.17C9.17,10.59,10.59,9.17,10.59,9.17z M14.5,4l2.04,2.04L4,18.59L5.41,20l12.55-12.55 L20,9.5V4H14.5z M14.83,13.41l-1.41,1.41l3.13,3.13L14.5,20H20v-5.5l-2.04,2.04L14.83,13.41z"/></svg></button>
            <button class="btn-sec" id="btn-prev"><svg viewBox="0 0 24 24"><path d="M6,6h2v12H6V6z M9.5,12l8.5,6V6L9.5,12z"/></svg></button>
            <button class="btn-main" id="btn-play-pause"><svg viewBox="0 0 24 24"><path id="play-icon-path" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg></button>
            <button class="btn-sec" id="btn-next"><svg viewBox="0 0 24 24"><path d="M6,18l8.5-6L6,6V18z M16,6v12h2V6H16z"/></svg></button>
            <button class="btn-sec" id="btn-loop"><svg viewBox="0 0 24 24"><path d="M7,7h10v3l4-4l-4-4v3H5v6h2V7z M17,17H7v-3l-4,4l4,4v-3h12v-6h-2V17z"/></svg></button>
        </div>
        
        <div class="progress-container" id="prog-cont">
            <div class="progress-bar" id="progress-bar">
                <div class="progress-handle" id="progress-handle"></div>
            </div>
        </div>
        
        <div class="gallery-container" id="gallery-wrapper">
            <div id="gallery-modal"><div id="lista-audios"></div></div>
            <button class="btn-gallery" id="btn-toggle-gallery">Mis Audios</button>
        </div>
    </div>
    <audio id="audio-sub" preload="auto"></audio>
</div>

<script>
    // =====================================================================
    // INTEGRACIÓN CON GLIDE:
    // Reemplaza [GLIDE_JSON_AUDIOS] usando una columna Template en Glide.
    // El formato debe ser un arreglo JSON estricto. 
    // Ejemplo: [{"name": "Pista 1", "audioUrl": "https://..."}]
    // =====================================================================
    const rawGlideData = `[GLIDE_JSON_AUDIOS]`; 
    
    let playlist = [];
    let originalPlaylistOrder = [];
    
    // Fallback de seguridad por si Glide aún no inyecta los datos correctamente
    try {
        playlist = JSON.parse(rawGlideData);
        originalPlaylistOrder = [...playlist];
    } catch (e) {
        playlist = [
            { name: "Sin Audios Asignados", audioUrl: "" }
        ];
    }

    let currentIndex = 0; 
    let isLooping = false; 
    let isShuffled = false;
    let isDraggingProgress = false;

    const audio = document.getElementById('audio-sub');
    const playIconPath = document.getElementById('play-icon-path');

    // Inicializar reproductor
    function cargarAudio(index) { 
        if (playlist.length === 0 || !playlist[index].audioUrl) return;
        currentIndex = index; 
        audio.src = playlist[index].audioUrl; 
        document.getElementById('display-name').innerText = playlist[index].name; 
        document.getElementById('progress-bar').style.width = '0%';
        audio.load(); 
    }

    // Renderizar Galería Modal
    function renderizarGaleria() {
        const contenedor = document.getElementById('lista-audios');
        contenedor.innerHTML = '';
        playlist.forEach((track, idx) => {
            const div = document.createElement('div');
            div.className = 'track-item';
            div.innerText = track.name.toUpperCase();
            div.onclick = () => {
                cargarAudio(idx);
                togglePlay(); // Reproducir automáticamente al seleccionar
                document.getElementById('gallery-modal').classList.remove('active-modal');
            };
            contenedor.appendChild(div);
        });
    }

    // Controles Play / Pausa
    function togglePlay() { 
        if(playlist.length === 0 || !playlist[0].audioUrl) return;
        if (audio.paused) { 
            audio.play().then(() => {
                playIconPath.setAttribute('d', 'M6,19h4V5H6V19z M14,5v14h4V5H14z'); 
            }).catch(e => console.error(e));
        } else { 
            audio.pause(); 
            playIconPath.setAttribute('d', 'M8,5.14V19.14L19,12.14L8,5.14Z'); 
        } 
    }

    // Controles Pistas
    function ejecutarSiguiente() {
        if(playlist.length === 0) return;
        let n = (currentIndex + 1) % playlist.length;
        cargarAudio(n);
        setTimeout(() => { if (!audio.paused || playIconPath.getAttribute('d').includes('M6,19')) togglePlay(); }, 50);
    }

    function ejecutarAnterior() {
        if(playlist.length === 0) return;
        let p = (currentIndex - 1 + playlist.length) % playlist.length;
        cargarAudio(p);
        setTimeout(() => { if (!audio.paused || playIconPath.getAttribute('d').includes('M6,19')) togglePlay(); }, 50);
    }

    // Lógica Barra de Progreso
    const progCont = document.getElementById('prog-cont');
    const progressBar = document.getElementById('progress-bar');
    const progressHandle = document.getElementById('progress-handle');

    audio.addEventListener('timeupdate', () => {
        if (audio.duration && !isDraggingProgress) {
            const pct = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = `${pct}%`;
        }
    });

    audio.addEventListener('ended', () => {
        if (isLooping) {
            audio.currentTime = 0;
            audio.play();
        } else {
            ejecutarSiguiente();
        }
    });

    function actualizarPosicionProgreso(clientX) {
        if (!audio.duration) return;
        const rect = progCont.getBoundingClientRect();
        let pos = (clientX - rect.left) / rect.width;
        pos = Math.max(0, Math.min(1, pos));
        progressBar.style.width = `${pos * 100}%`;
        return pos;
    }

    function iniciarArrastre(e) {
        if (!audio.duration) return;
        isDraggingProgress = true;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        actualizarPosicionProgreso(clientX);
        if (progressHandle) progressHandle.style.opacity = '1';
    }

    function moverArrastre(e) {
        if (!isDraggingProgress) return;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        actualizarPosicionProgreso(clientX);
    }

    function finalizarArrastre(e) {
        if (!isDraggingProgress) return;
        isDraggingProgress = false;
        const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
        const pos = actualizarPosicionProgreso(clientX);
        if (pos !== undefined) {
            audio.currentTime = pos * audio.duration;
        }
        if (progressHandle) progressHandle.style.opacity = '';
    }

    progCont.addEventListener('mousedown', iniciarArrastre);
    window.addEventListener('mousemove', moverArrastre);
    window.addEventListener('mouseup', finalizarArrastre);
    progCont.addEventListener('touchstart', iniciarArrastre, { passive: true });
    window.addEventListener('touchmove', moverArrastre, { passive: true });
    window.addEventListener('touchend', finalizarArrastre);

    // Asignación de Eventos Botones
    document.getElementById('btn-play-pause').onclick = togglePlay;
    document.getElementById('btn-next').onclick = ejecutarSiguiente;
    document.getElementById('btn-prev').onclick = ejecutarAnterior;

    document.getElementById('btn-loop').onclick = () => {
        isLooping = !isLooping;
        document.getElementById('btn-loop').style.borderColor = isLooping ? 'var(--cian)' : 'rgba(197, 160, 89, 0.5)';
    };

    document.getElementById('btn-shuffle').onclick = () => {
        isShuffled = !isShuffled;
        document.getElementById('btn-shuffle').style.borderColor = isShuffled ? 'var(--cian)' : 'rgba(197, 160, 89, 0.5)';
        if (isShuffled) {
            playlist.sort(() => Math.random() - 0.5);
        } else {
            playlist = [...originalPlaylistOrder];
        }
        renderizarGaleria();
    };

    document.getElementById('btn-toggle-gallery').onclick = () => {
        const modal = document.getElementById('gallery-modal');
        modal.classList.toggle('active-modal');
    };

    // Inicializar reproductor visualmente
    renderizarGaleria();
    cargarAudio(0);
</script>
</body>
</html>
