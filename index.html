<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    /* Paleta de colores subliminal/premium */
    --bg-base: #13141c;         /* Carbón muy oscuro */
    --surface-gradient: linear-gradient(145deg, #1a1b26, #16161e); /* Índigo profundo */
    --accent-sage: #8b9d83;     /* Verde salvia suave */
    --accent-glow: rgba(139, 157, 131, 0.4);
    --text-primary: #e2e8f0;
    --text-secondary: #64748b;
    --glass-border: rgba(255, 255, 255, 0.05);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: system-ui, -apple-system, sans-serif;
  }

  /* Contenedor transparente para adaptarse al Rich Text / HTML de Glide */
  body {
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    padding: 16px 8px;
  }

  .player-wrapper {
    width: 100%;
    max-width: 420px;
    background: var(--surface-gradient);
    border-radius: 28px;
    padding: 28px 24px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 1px var(--glass-border);
    border: 1px solid var(--glass-border);
    /* Textura dinámica suave (Glassmorphism) */
    backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* Simulación de onda / barra de progreso minimalista */
  .progress-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-track {
    flex: 1;
    height: 4px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    position: relative;
    overflow: hidden;
  }

  .progress-fill {
    width: 0%; /* Glide puede inyectar el porcentaje aquí */
    height: 100%;
    background: var(--accent-sage);
    border-radius: 8px;
    box-shadow: 0 0 8px var(--accent-glow);
    /* Animación base para cuando Glide actualice el width */
    transition: width 0.3s linear; 
  }

  .time-text {
    font-size: 0.75rem;
    color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.5px;
  }

  /* Controles principales */
  .controls-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 0 8px;
  }

  .btn-icon {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-size: 1.25rem;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    justify-content: center;
    align-items: center;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-icon:hover, .btn-icon:active {
    color: var(--text-primary);
    transform: scale(1.1);
  }

  /* Botón de Inicio / Pausa destacado */
  .btn-play-pause {
    width: 64px;
    height: 64px;
    background: var(--accent-sage);
    color: var(--bg-base);
    border-radius: 50%;
    font-size: 1.5rem;
    box-shadow: 0 8px 24px var(--accent-glow);
  }

  .btn-play-pause:hover, .btn-play-pause:active {
    background: #9db294; /* Salvia un poco más claro */
    color: var(--bg-base);
    transform: scale(1.05) translateY(-2px);
    box-shadow: 0 12px 28px rgba(139, 157, 131, 0.6);
  }

  .btn-loop.active {
    color: var(--accent-sage);
  }

  /* Separador elegante */
  .divider {
    height: 1px;
    width: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    margin: 4px 0;
  }

  /* Disparador visual: Mis Audios */
  .btn-mis-audios {
    width: 100%;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: var(--text-primary);
    padding: 16px;
    border-radius: 16px;
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 0.5px;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    transition: all 0.3s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-mis-audios i {
    color: var(--accent-sage);
    font-size: 1.1rem;
  }

  .btn-mis-audios:hover, .btn-mis-audios:active {
    background: rgba(139, 157, 131, 0.1);
    border-color: rgba(139, 157, 131, 0.3);
    transform: translateY(-2px);
  }
</style>
</head>
<body>

<div class="player-wrapper">
  
  <div class="progress-area">
    <span class="time-text">0:00</span>
    <div class="progress-track">
      <div class="progress-fill" style="width: 30%;"></div>
    </div>
    <span class="time-text">--:--</span>
  </div>

  <div class="controls-row">
    <button class="btn-icon btn-loop" aria-label="Bucle">
      <i class="fa-solid fa-repeat"></i>
    </button>
    
    <button class="btn-icon" aria-label="Anterior">
      <i class="fa-solid fa-backward-step"></i>
    </button>
    
    <button class="btn-icon btn-play-pause" aria-label="Inicio / Pausa">
      <i class="fa-solid fa-play" style="margin-left: 4px;"></i>
      </button>
    
    <button class="btn-icon" aria-label="Posterior">
      <i class="fa-solid fa-forward-step"></i>
    </button>
    
    <button class="btn-icon" aria-label="Detener">
      <i class="fa-solid fa-stop"></i>
    </button>
  </div>

  <div class="divider"></div>

  <button class="btn-mis-audios" aria-label="Abrir Mis Audios">
    <i class="fa-solid fa-layer-group"></i>
    Mis Audios
  </button>

</div>

</body>
</html>
